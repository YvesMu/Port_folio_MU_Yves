<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0e27"/>
  <!-- Rounded square background -->
  <rect x="5" y="5" width="90" height="90" rx="15" fill="url(#grad1)"/>
  <!-- Code brackets symbol -->
  <g fill="white" font-family="monospace" font-size="50" font-weight="bold" text-anchor="middle">
    <!-- Less than sign -->
    <text x="35" y="65">&lt;</text>
    <!-- Greater than sign -->
    <text x="65" y="65">&gt;</text>
  </g>
  <!-- Dot accent -->
  <circle cx="50" cy="30" r="4" fill="white" opacity="0.8"/>
</svg>
